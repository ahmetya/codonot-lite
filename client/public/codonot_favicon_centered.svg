  <rect x="18" y="112" width="34" height="60" rx="17" fill="#98a7b3" stroke="#171b21" stroke-width="8" style="fill:rgb(152, 167, 179);stroke:rgb(23, 27, 33);color:rgb(255, 255, 255);stroke-width:8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

