server {
    server_name lite.codonot.com;

    location / {
        root /root/codonot-lite/client/dist;
        try_files $uri $uri/ /index.html;
    }

    location /api/helperbot/stream-sdk {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
    }

    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/lite.codonot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lite.codonot.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = lite.codonot.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name lite.codonot.com;
    return 404;
}